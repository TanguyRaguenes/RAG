# Nom visible dans l'onglet "Actions" de GitHub
name: CI

# Lance la CI a chaque push et a chaque Pull Request
on:
  push:
  pull_request:

jobs:
  python-checks:
    # Ce job est lance une fois par microservice Python.
    # Cela evite de copier/coller les memes etapes 6 fois.
    name: Python checks - ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: rag_embedder
            coverage: app
          - service: rag_retriever
            coverage: app
          - service: rag_orchestrator
            coverage: app
          - service: rag_evaluator
            coverage: app
          - service: rag_ihm
            coverage: app
          - service: rag_mcp
            coverage: .

    steps:
      # 1. Recupere le code du depot dans la VM GitHub
      - name: Checkout repository
        uses: actions/checkout@v7

      # 2. Installe uv pour gerer Python et les dependances
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # 3. Installe Python 3.12 dans la VM
      - name: Install Python
        run: uv python install 3.12

      # 4. Installe les dependances du microservice courant
      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: uv sync --dev

      # 5. Verifie la qualite du code Python avec Ruff
      - name: Run Ruff linter
        working-directory: ${{ matrix.service }}
        run: uv run --with ruff ruff check .

      # 6. Verifie que le code est bien formate avec Ruff
      - name: Run Ruff format check
        working-directory: ${{ matrix.service }}
        run: uv run --with ruff ruff format --check .

      # 7. Lance les tests unitaires avec un seuil de couverture minimal
      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: |
          uv run --with pytest-cov --with pytest-asyncio pytest -q tests/unit_tests \
            --cov=${{ matrix.coverage }} \
            --cov-report=term-missing \
            --cov-fail-under=70

  docker-checks:
    # Ce job demarre la stack complete pour tester les interactions entre services.
    name: Docker stack checks
    runs-on: ubuntu-latest
    needs: python-checks
    env:
      # Force un nom d'image Docker stable pour les scans Trivy.
      COMPOSE_PROJECT_NAME: rag

    steps:
      # 1. Recupere le code du depot dans la VM GitHub
      - name: Checkout repository
        uses: actions/checkout@v7

      # 2. Prepare les fichiers attendus par docker-compose
      # Les vrais fichiers .env ne sont pas versionnes dans GitHub.
      - name: Prepare Docker Compose files
        run: |
          mkdir -p ../wikis

          mkdir -p rag_orchestrator
          mkdir -p rag_evaluator
          mkdir -p rag_ihm
          mkdir -p rag_mcp
          mkdir -p pocket-id

          cat > .env <<EOF
          POSTGRES_DB=rag_test
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          EOF

          touch rag_orchestrator/.env
          touch rag_evaluator/.env
          touch rag_ihm/.env
          touch rag_mcp/.env
          touch pocket-id/.env

          # GitHub Actions est sensible a la casse des noms de fichiers.
          # docker-compose attend Dockerfile pour rag_mcp.
          cp rag_mcp/dockerfile rag_mcp/Dockerfile

      # 3. Installe uv pour lancer les tests d'integration Python
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # 4. Installe Python 3.12 dans la VM
      - name: Install Python
        run: uv python install 3.12

      # 5. Construit et demarre tous les conteneurs du RAG
      - name: Start Docker stack
        run: docker compose up -d --build

      # 6. Scanne l'image Docker du microservice rag_embedder
      - name: Scan rag_embedder image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-rag_embedder:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      # 7. Scanne l'image Docker du microservice rag_retriever
      - name: Scan rag_retriever image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-rag_retriever:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      # 8. Scanne l'image Docker du microservice rag_orchestrator
      - name: Scan rag_orchestrator image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-rag_orchestrator:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      # 9. Scanne l'image Docker du microservice rag_evaluator
      - name: Scan rag_evaluator image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-rag_evaluator:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      # 10. Scanne l'image Docker du microservice rag_ihm
      - name: Scan rag_ihm image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-rag_ihm:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      # 11. Scanne l'image Docker du microservice rag_mcp
      - name: Scan rag_mcp image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-rag_mcp:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      # 12. Attend que le modele d'embedding soit disponible dans Ollama
      - name: Wait for Ollama embedding model
        run: |
          until curl -s http://localhost:11434/api/tags | grep -q "bge-m3:567m"; do
            echo "Waiting for Ollama model bge-m3:567m..."
            sleep 10
          done

      # 13. Lance les tests d'integration presents dans les microservices
      - name: Run integration tests
        run: |
          for service in rag_embedder rag_retriever rag_orchestrator rag_evaluator rag_ihm rag_mcp; do
            if [ -d "$service/tests/integration_tests" ]; then
              echo "Running integration tests for $service"
              (cd "$service" && uv sync --dev && uv run --with pytest-asyncio pytest -q tests/integration_tests)
            else
              echo "No integration tests for $service"
            fi
          done

      # 14. Affiche les logs Docker si une etape echoue
      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs

      # 15. Arrete les conteneurs meme si une etape precedente echoue
      - name: Stop Docker stack
        if: always()
        run: docker compose down
