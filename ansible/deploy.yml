- name: Configure and deploy RAG stack
  hosts: rag_servers
  # Execute les taches admin avec sudo sur le VPS cible.
  become: true

  # Ces controles s'executent avant toute modification importante du serveur.
  pre_tasks:
    # Ubuntu appartient a la famille Debian : cette verification accepte donc Ubuntu et Debian.
    - name: Ensure target OS is Debian based
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "This playbook currently supports Debian/Ubuntu servers only."

    # Les fichiers .env.prod restent sur ton Mac et ne sont copies que s'ils existent.
    - name: Check required local env files exist
      ansible.builtin.stat:
        path: "{{ item.src }}"
      register: env_file_stats
      loop: "{{ env_files }}"
      # Cette verification concerne le poste local, pas le VPS.
      delegate_to: localhost
      become: false

    # On bloque le deploiement si un fichier de secrets prod manque localement.
    - name: Stop if a local env file is missing
      ansible.builtin.fail:
        msg: "Missing local env file: {{ item.item.src }}. Copy the matching .env.prod.example, fill secrets, then retry."
      loop: "{{ env_file_stats.results }}"
      when: not item.stat.exists

  tasks:
    # Paquets systeme minimums pour installer Docker et gerer le pare-feu.
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
        state: present
        update_cache: true

    # Docker recommande de stocker sa cle GPG dans /etc/apt/keyrings.
    - name: Create Docker apt keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    # Ajoute la cle officielle Docker pour verifier les paquets installes par apt.
    - name: Download Docker apt GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    # Convertit le nom d'architecture Linux si Docker attend un nom different.
    - name: Set Docker apt architecture
      ansible.builtin.set_fact:
        docker_apt_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}"

    # Ajoute le depot Docker adapte a la distribution du VPS, ici Ubuntu.
    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    # Installe Docker Engine et le plugin docker compose utilise par la stack.
    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    # Configure la rotation des logs Docker pour eviter de remplir le disque du VPS.
    - name: Configure Docker log rotation
      ansible.builtin.template:
        src: docker-daemon.json.j2
        dest: /etc/docker/daemon.json
        mode: "0644"
      notify: Restart Docker

    # Force le redemarrage Docker maintenant, avant de lancer les conteneurs.
    - name: Apply Docker configuration before deploying containers
      ansible.builtin.meta: flush_handlers

    # Garantit que Docker demarre automatiquement au boot du VPS.
    - name: Ensure Docker is enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    # UFW est optionnel : ces regles ne s'appliquent que si configure_ufw vaut true.
    - name: Allow SSH with UFW
      ansible.builtin.command: ufw allow OpenSSH
      changed_when: true
      when: configure_ufw

    - name: Allow HTTP with UFW
      ansible.builtin.command: ufw allow 80/tcp
      changed_when: true
      when: configure_ufw

    - name: Allow HTTPS with UFW
      ansible.builtin.command: ufw allow 443/tcp
      changed_when: true
      when: configure_ufw

    - name: Enable UFW
      ansible.builtin.command: ufw --force enable
      changed_when: true
      when: configure_ufw

    # Cree l'arborescence de deploiement utilisee par docker-compose.prod.yml.
    - name: Create deployment directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ deploy_dir }}"
        - "{{ deploy_dir }}/rag_orchestrator"
        - "{{ deploy_dir }}/rag_ihm"
        - "{{ deploy_dir }}/rag_mcp"
        - "{{ deploy_dir }}/rag_evaluator"
        - "{{ deploy_dir }}/pocket-id"
        - "{{ deploy_dir }}/database/postgres/init"
        - "{{ deploy_dir }}/observability"
        - "{{ deploy_dir }}/wikis"

    # Copie le compose prod sur le VPS : c'est ce fichier qui lancera la stack.
    - name: Copy production compose file
      ansible.builtin.copy:
        src: "{{ project_root }}/docker-compose.prod.yml"
        dest: "{{ deploy_dir }}/docker-compose.prod.yml"
        mode: "0644"

    # Copie la configuration Caddy qui sera montee dans le conteneur reverse proxy.
    - name: Copy Caddyfile
      ansible.builtin.copy:
        src: "{{ project_root }}/Caddyfile"
        dest: "{{ deploy_dir }}/Caddyfile"
        mode: "0644"

    # Copie les vrais fichiers .env.prod locaux vers les chemins attendus par Compose.
    - name: Copy production env files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "0600"
      loop: "{{ env_files }}"

    # Copie les scripts SQL executes au premier demarrage du conteneur Postgres.
    - name: Copy PostgreSQL init scripts
      ansible.builtin.copy:
        src: "{{ project_root }}/database/postgres/init/"
        dest: "{{ deploy_dir }}/database/postgres/init/"
        mode: preserve

    # Copie les fichiers Prometheus, Grafana, Loki/Alloy et Tempo utilises en prod.
    - name: Copy observability configuration
      ansible.builtin.copy:
        src: "{{ project_root }}/observability/"
        dest: "{{ deploy_dir }}/observability/"
        mode: preserve

    # Telecharge les images depuis Docker Hub sur le VPS, sans build local.
    - name: Pull Docker images
      ansible.builtin.command: docker compose -f docker-compose.prod.yml pull
      args:
        chdir: "{{ deploy_dir }}"
      changed_when: true

    # Lance ou met a jour les conteneurs en arriere-plan.
    - name: Start Docker Compose stack
      ansible.builtin.command: docker compose -f docker-compose.prod.yml up -d
      args:
        chdir: "{{ deploy_dir }}"
      changed_when: true

  handlers:
    # Handler appele uniquement quand /etc/docker/daemon.json est modifie.
    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted
