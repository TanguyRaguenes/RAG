services:

  # Ollama : execute les modeles IA en local pour les embeddings et le LLM.
  ollama:
    image: ollama/ollama:0.31.2
    container_name: ollama_container
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama  # stocke les modèles téléchargés
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      "
      ollama serve &
      until ollama list >/dev/null 2>&1; do
        echo 'Waiting for ollama...'; sleep 1;
      done;
      ollama pull bge-m3:567m;
      ollama pull qwen2.5:3b;
      echo 'Models pulled.';
      wait
      "

  # tei_reranker : serveur d'inférence Hugging Face TEI pour le modèle de reranking BGE.
  tei_reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: tei_reranker_container
    command: --model-id cross-encoder/mmarco-mMiniLMv2-L12-H384-v1 --port 80
    ports:
      - "8081:80"
    volumes:
      - tei_reranker_data:/data
    restart: unless-stopped

  # Chroma : stocke les embeddings dans une base vectorielle.
  chroma:
    image: chromadb/chroma:1.5.9
    container_name: chroma_container
    ports:
    - "8000:8000"
    volumes:
      - chroma_data:/data
    environment:
      - PERSIST_DIRECTORY=/data
    restart: unless-stopped

  # rag_retriever : lit et ecrit les chunks dans la base vectorielle Chroma.
  rag_retriever:
    build:
      context: ./rag_retriever
      dockerfile: dockerfile
    container_name: rag_retriever_container
    ports:
      - "8001:8000"
      - "5678:5678" # Port par defaut utilisé par debugpy (library de débogage)
    environment:
      - DEBUG=1
    volumes:
      - ./rag_retriever:/app # HotReload : Montage du code source pour que les modifs soient prises en compte sans rebuild
    depends_on:
      - chroma
  

  # rag_embedder : transforme les documents et questions en vecteurs.
  rag_embedder:
    build:
      context: ./rag_embedder
      dockerfile: dockerfile
      args:
        DEBUG: "1"
    container_name: rag_embedder_container
    ports:
      - "8002:8000"
      - "5679:5678" # Port par defaut utilisé par debugpy pour débugger uvicorn
      - "5689:5689" # Port par defaut utilisé par debugpy pour débugger pytest
    environment:
      - DEBUG=1
      - RAG_RETRIEVER_INGEST_DOCUMENTS_URL=http://rag_retriever:8000/save_items
    volumes:
      - ./rag_embedder:/app # HotReload : Montage du code source pour que les modifs soient prises en compte sans rebuild
      - ../wikis:/app/wikis:ro # On charge dans le container en lecture seule "ro=ReadOnly" les wikis
    depends_on:
      - ollama
      - rag_retriever

  # rag_reranker : réordonne les chunks récupérés selon leur pertinence pour la question.
  rag_reranker:
    build:
      context: ./rag_reranker
      dockerfile: dockerfile
      args:
        DEBUG: "1"
    container_name: rag_reranker_container
    ports:
      - "8006:8000"
      - "5684:5678" # Port par defaut utilisé par debugpy pour débugger uvicorn
    environment:
      - DEBUG=1
    volumes:
      - ./rag_reranker:/app # HotReload : Montage du code source pour que les modifs soient prises en compte sans rebuild
    depends_on:
      - tei_reranker
   
  # rag_orchestrator : coordonne les appels entre embedder, retriever, LLM et base SQL.
  rag_orchestrator:
    build:
      context: ./rag_orchestrator
      dockerfile: dockerfile
    container_name: rag_orchestrator_container
    env_file:
      - ./rag_orchestrator/.env
    ports:
      - "8003:8000"
      - "5680:5678" # port debug côté host (évite conflit avec rag_embedder:5678)
    environment:
      - DEBUG=1
      - RAG_EMBEDDER_EMBED_URL=http://rag_embedder:8000/embed
      - RAG_RETRIEVER_RETRIEVE_CHUNKS_URL=http://rag_retriever:8000/retrieve_chunks
      - RAG_RETRIEVER_RETRIEVE_DOCUMENT_CHUNKS_URL=http://rag_retriever:8000/retrieve_document_chunks
      - RAG_RERANKER_RERANK_CHUNKS_URL=http://rag_reranker:8000/rerank_chunks
      - RAG_USAGE_ADMIN_GROUPS=rag_admin
    volumes:
      - ./rag_orchestrator:/app # HotReload : Montage du code source pour que les modifs soient prises en compte sans rebuild
    depends_on:
      - ollama
      - rag_embedder
      - rag_retriever
      - rag_reranker
      - postgres

  # rag_evaluator : mesure la qualite des reponses et des documents recuperes.
  rag_evaluator:
    build:
      context: ./rag_evaluator
      dockerfile: dockerfile
    container_name: rag_evaluator_container
    env_file:
      - ./rag_evaluator/.env
    ports:
      - "8004:8000"   # evaluator expose 8000 en interne (au sein du container), publié sur 8003 host (host= ma machine = pc/serveur)
      - "5681:5678"   # port debug côté host (évite conflit avec rag_embedder:5678)
    environment:
      - DEBUG=1
      - RAG_ORCHESTRATOR_ASK_QUESTION_URL=http://rag_orchestrator:8000/ask_question
      - DATASET_PATH=/app/data/dataset.json
    volumes:
      - ./rag_evaluator:/app
      - ./rag_evaluator/dataset.json:/app/data/dataset.json:ro # On charge dans le container en lecture seule "ro=ReadOnly" le dataset
    depends_on:
      - rag_orchestrator

  # rag_ihm : affiche l'interface utilisateur Streamlit du RAG.
  rag_ihm:
    build:
      context: ./rag_ihm
      dockerfile: dockerfile
    container_name: rag_ihm_container
    env_file:
      - ./rag_ihm/.env
    ports:
      - "8501:8501" # Port par défaut utilisé par Streamlit.
      - "5682:5678"   # port debug côté host (évite conflit avec rag_embedder:5678)
    environment:
      - DEBUG=1
      - RAG_ORCHESTRATOR_TEST_CONNEXION_URL=http://rag_orchestrator:8000
      - RAG_EVALUATOR_TEST_CONNEXION_URL=http://rag_evaluator:8000
      - RAG_ORCHESTRATOR_ASK_QUESTION_URL=http://rag_orchestrator:8000/ask_question
      - RAG_EVALUATOR_EVALUATE_RAG_URL=http://rag_evaluator:8000/evaluate_rag
      - RAG_IHM_OIDC_AUTHORIZE_URL=http://localhost:1411/authorize
      - RAG_IHM_OIDC_TOKEN_URL=http://pocket-id:1411/api/oidc/token
      - RAG_IHM_OIDC_REDIRECT_URI=http://localhost:8501
      - RAG_IHM_OIDC_SCOPE=openid email profile groups
    volumes:
      - ./rag_ihm:/app # HotReload : Montage du code source pour que les modifs soient prises en compte sans rebuild
    depends_on:
      - rag_orchestrator
      - rag_evaluator
      - pocket-id

  # rag_mcp : expose le RAG a Kilo Code via le protocole MCP.
  rag_mcp:
    build:
      context: ./rag_mcp
      dockerfile: Dockerfile
    container_name: rag_mcp_container
    env_file:
      - ./rag_mcp/.env
    ports:
      - "8005:8000"
      - "5683:5678"   # port debug côté host (évite conflit avec rag_embedder:5678)
    environment:
      - DEBUG=1
      - FORWARDED_ALLOW_IPS=*
      - RAG_ORCHESTRATOR_RETRIEVE_CHUNKS_URL=http://rag_orchestrator:8000/retrieve_chunks
      - RAG_MCP_OIDC_TOKEN_URL=http://pocket-id:1411/api/oidc/token
    volumes:
      - ./rag_mcp:/app
    depends_on:
      - rag_orchestrator

  # Prometheus : collecte les metriques exposees par les microservices.
  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: prometheus_container
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - rag_embedder
      - rag_retriever
      - rag_reranker
      - rag_evaluator
      - rag_orchestrator
      - pocket-id

  # Loki : stocke les logs applicatifs pour les consulter dans Grafana.
  loki:
    image: grafana/loki:3.7.3
    container_name: loki_container
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  # Alloy : collecte les logs des containers et les envoie vers Loki.
  alloy:
    image: grafana/alloy:v1.17.1
    container_name: alloy_container
    ports:
      - "12345:12345"
    volumes:
      - ./observability/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    depends_on:
      - loki

  # Tempo : stocke les traces distribuees OpenTelemetry.
  tempo:
    image: grafana/tempo:3.0.2
    container_name: tempo_container
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "3200:3200" # API HTTP Tempo, utilisée par Grafana
      - "4317:4317" # Réception des traces OTLP en gRPC
      - "4318:4318" # Réception des traces OTLP en HTTP
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo

  # Grafana : affiche les dashboards de metriques, logs et traces.
  grafana:
    image: grafana/grafana:13.1.0
    container_name: grafana_container
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo

  # Pocket ID : gere l'authentification OIDC utilisee par l'application.
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: pocket_id_container
    restart: unless-stopped
    env_file:
      - ./pocket-id/.env
    ports:
      - "1411:1411"
    volumes:
      - pocket_id_data:/app/data

  # Postgres : stocke les donnees relationnelles du RAG.
  postgres:
    image: postgres:16-alpine
    container_name: postgres_container
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init:/docker-entrypoint-initdb.d:ro
  
  # Adminer : fournit une interface web simple pour consulter Postgres.
  adminer:
    image: adminer:4.8.1
    container_name: adminer_container
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # rag_embedder_docs : sert la documentation MkDocs du microservice embedder.
  rag_embedder_docs:
      build:
        context: ./rag_embedder
        dockerfile: dockerfile.docs
      container_name: rag_embedder_docs_container
      ports:
        - "8102:8000"
      volumes:
        - ./rag_embedder/docs:/app/docs
        - ./rag_embedder/mkdocs.yml:/app/mkdocs.yml

  # rag_reranker_docs : sert la documentation MkDocs du microservice reranker.
  rag_reranker_docs:
      build:
        context: ./rag_reranker
        dockerfile: dockerfile.docs
      container_name: rag_reranker_docs_container
      ports:
        - "8106:8000"
      volumes:
        - ./rag_reranker/docs:/app/docs
        - ./rag_reranker/mkdocs.yml:/app/mkdocs.yml

volumes:
  ollama_data:
  tei_reranker_data:
  chroma_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  pocket_id_data:
  postgres_data:
